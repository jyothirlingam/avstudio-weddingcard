<!DOCTYPE html>
<html lang="te">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV STUDIO - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Telugu:wght@400;600;800&family=Ramabhadra&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-red: #d31a1a;
            --primary-blue: #004ba0;
            --primary-green: #1a7a1a;
            --bg-color: #fdfbf7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Anek Telugu', sans-serif;
            background-color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        #dashboardView,
        #adminView {
            display: none;
            flex-direction: column;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        #loadingView {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background-color: #e0e0e0;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #fdfbf7;
            border-top: 5px solid var(--primary-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-family: 'Anek Telugu', sans-serif;
            color: var(--primary-blue);
            font-size: 18px;
            font-weight: 600;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .dash-header h2 {
            color: var(--primary-red);
            margin: 0;
            font-family: 'Anek Telugu', sans-serif;
            font-weight: 800;
            font-size: 26px;
        }

        .btn-new-card {
            background: linear-gradient(180deg, #1a7a1a, #2ecc71);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .btn-new-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .dash-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
            border-top: 5px solid var(--primary-red);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .dash-card h3 {
            color: var(--primary-blue);
            margin-bottom: 5px;
            font-family: 'Ramabhadra', sans-serif;
            font-size: 22px;
        }

        .dash-card p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .dash-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 8px 15px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .btn-sm:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-v {
            background: #34495e;
        }

        .btn-e {
            background: #f39c12;
        }

        .btn-s {
            background: #25D366;
        }

        .view-badge {
            background: #34495e;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 5px;
            font-weight: normal;
        }

        .admin-container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            font-family: sans-serif;
            margin: 0 auto;
        }

        .admin-container h2 {
            text-align: center;
            color: #d31a1a;
            margin-bottom: 25px;
            font-family: 'Anek Telugu', sans-serif;
            font-weight: 800;
        }

        .form-section {
            margin-bottom: 25px;
            padding: 15px;
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .section-title {
            font-weight: bold;
            color: #1a7a1a;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #1a7a1a;
            outline: none;
            box-shadow: 0 0 5px rgba(26, 122, 26, 0.2);
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #1a7a1a, #2ecc71);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-view-card {
            width: 100%;
            padding: 12px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .client-id-box {
            background-color: #e8f4f8;
            border: 2px dashed #004ba0;
        }

        #customAlert {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 20000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: pop 0.3s ease-out;
            font-family: sans-serif;
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .modal-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div id="loadingView">
        <div class="spinner"></div>
        <p class="loading-text">లోడ్ అవుతోంది... 🌸</p>
    </div>

    <div id="dashboardView">
        <div class="dash-header">
            <h2>AV STUDIO - Admin Manager</h2>
            <button class="btn-new-card" onclick="window.toggleView('admin', true)">+ New Card</button>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <div id="adminView">
        <div class="admin-container">
            <h2>AV STUDIO - Editor</h2>
            <form id="adminForm">
                <div class="form-section client-id-box">
                    <div class="section-title">🔗 Customer ID (Unique Link)</div>
                    <div class="form-group">
                        <label>కస్టమర్ ఐడి (Space లు లేకుండా ఇంగ్లీష్ లో రాయండి. ఉదా: praveen_jayasri):</label>
                        <input type="text" id="adminClientId" placeholder="e.g., ram_sita" required>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">Header Details</div>
                    <div class="form-group"><label>Family Name (Title):</label><input type="text" id="adminTitleFamily">
                    </div>
                    <div class="form-group"><label>Groom Name:</label><input type="text" id="adminGroom"><input
                            type="file" id="adminGroomPhoto" style="margin-top:5px" accept="image/*"></div>
                    <div class="form-group"><label>Bride Name:</label><input type="text" id="adminBride"><input
                            type="file" id="adminBridePhoto" style="margin-top:5px" accept="image/*"></div>
                </div>

                <div class="form-section">
                    <div class="section-title">Event Info</div>
                    <div class="form-group"><label>Muhurtham Time:</label><input type="text" id="adminTime"></div>
                    <div class="form-group"><label>Countdown & Calendar Date/Time (టైమర్ కోసం):</label><input
                            type="datetime-local" id="adminTimerDate"></div>
                    <div class="form-group"><label>Venue:</label><textarea id="adminVenue" rows="2"></textarea></div>
                    <div class="form-group"><label>YouTube Link:</label><input type="url" id="adminYoutube"></div>
                    <div class="form-group"><label>Google Maps Link:</label><input type="url" id="adminMap"></div>
                </div>

                <div class="form-section">
                    <div class="section-title">Family Details</div>
                    <div class="form-group"><label>Grandparents (తాతయ్య - అమ్మమ్మ):</label><input type="text"
                            id="fName1" placeholder="Name 1"><input type="text" id="fName2" placeholder="Name 2"
                            style="margin-top:5px"></div>
                    <div class="form-group"><label>Uncle/Aunt (మేనమామ - అత్తయ్య):</label><input type="text" id="fName3"
                            placeholder="Name 1"><input type="text" id="fName4" placeholder="Name 2"
                            style="margin-top:5px"></div>
                    <div class="form-group"><label>Paternal Uncle (పెదనాన్న - పెద్దమ్మ):</label><input type="text"
                            id="fName5" placeholder="Name 1"><input type="text" id="fName6" placeholder="Name 2"
                            style="margin-top:5px"></div>
                    <div class="form-group"><label>Sister (చెల్లెలు):</label><input type="text" id="fName7"
                            placeholder="Name"></div>
                    <div class="form-group"><label>Inviter Name:</label><input type="text" id="adminInviterName"></div>
                    <div class="form-group"><label>Greetings (e.g., అభినందనలతో):</label><input type="text"
                            id="adminGreetings"></div>
                </div>

                <button type="submit" class="btn-save" id="saveButton">Save / Update to Firebase</button>
                <button type="button" class="btn-view-card" onclick="window.toggleView('dashboard')">🔙 Go to
                    Dashboard</button>
            </form>
        </div>
    </div>

    <div id="customAlert">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">✅</div>
            <h3 id="modalMsg">Data Saved!</h3>
            <button class="modal-btn" onclick="window.closeModal()">Super!</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa0TMYw90aXznIkC_8ShBR1Tl0oMk9344",
            authDomain: "wedding-invitation-a3c47.firebaseapp.com",
            projectId: "wedding-invitation-a3c47",
            storageBucket: "wedding-invitation-a3c47.firebasestorage.app",
            messagingSenderId: "552334912301",
            appId: "1:552334912301:web:5bc2b91803e01cf65581a4",
            measurementId: "G-5CFNFRDFFB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const dataFields = ['adminTitleFamily', 'adminGroom', 'adminBride', 'adminTime', 'adminTimerDate', 'adminVenue', 'adminInviterName', 'adminGreetings', 'adminYoutube', 'adminMap', 'fName1', 'fName2', 'fName3', 'fName4', 'fName5', 'fName6', 'fName7'];
        let globalData = {};
        let allClientsData = {};
        let currentClientId = null;

        // ఇండెక్స్ ఫైల్ లింక్ క్రియేట్ చేయడానికి లాజిక్
        const getCustomerUrl = (id) => {
            const pathArray = window.location.pathname.split('/');
            pathArray.pop(); // చివర ఉన్న ఫైల్ పేరును (ఉదాహరణకి wdng_admin.html) తీసేస్తుంది
            const baseUrl = window.location.origin + pathArray.join('/') + '/';
            return `${baseUrl}index.html?id=${id}`;
        };

        window.toggleView = function (view, isNewCard = false) {
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('adminView').style.display = 'none';

            if (view === 'dashboard') {
                document.getElementById('dashboardView').style.display = 'flex';
                renderDashboard();
            } else if (view === 'admin') {
                document.getElementById('adminView').style.display = 'flex';
                if (isNewCard) {
                    currentClientId = null;
                    document.getElementById('adminClientId').value = '';
                    document.getElementById('adminClientId').removeAttribute('readonly');
                    dataFields.forEach(field => document.getElementById(field).value = '');
                } else {
                    document.getElementById('adminClientId').value = currentClientId;
                    document.getElementById('adminClientId').setAttribute('readonly', true);
                    dataFields.forEach(field => {
                        if (globalData[field]) document.getElementById(field).value = globalData[field];
                    });
                }
            }
            window.scrollTo(0, 0);
        };

        function renderDashboard() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            if (Object.keys(allClientsData).length === 0) {
                grid.innerHTML = '<p style="text-align: center; width: 100%;">ఇంకా ఏ కార్డులు లేవు. "+ New Card" నొక్కండి.</p>';
                return;
            }

            for (const [id, data] of Object.entries(allClientsData)) {
                const customerLink = getCustomerUrl(id);
                const shareText = `🌸 *${data.adminTitleFamily || 'మా'} ఇంట కళ్యాణ మహోత్సవం* 🌸\n\nచి|| *${data.adminGroom}* & చి||ల||సౌ|| *${data.adminBride}* ల వివాహ మహోత్సవానికి మిమ్మల్ని సాదరంగా ఆహ్వానిస్తున్నాము.\n\nమా డిజిటల్ పత్రికను కింది లింక్ ద్వారా చూడగలరు:\n${customerLink}`;
                const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;

                grid.innerHTML += `
                    <div class="dash-card">
                        <div>
                            <h3>${data.adminGroom || 'Groom'} & ${data.adminBride || 'Bride'}</h3>
                            <p>ID: ${id} <span class="view-badge">👁️ ${data.views || 0}</span></p> 
                            <p style="color: #1a7a1a; font-weight:normal;">📅 ${data.adminTime || 'తేదీ రాయలేదు'}</p>
                        </div>
                        <div class="dash-actions">
                            <a href="${customerLink}" target="_blank" class="btn-sm btn-v">👁️ View</a>
                            <button onclick="window.editCardFromDash('${id}')" class="btn-sm btn-e">⚙️ Edit</button>
                            <a href="${whatsappUrl}" target="_blank" class="btn-sm btn-s">📤 Share</a>
                        </div>
                    </div>`;
            }
        }

        window.editCardFromDash = function (id) {
            currentClientId = id;
            globalData = allClientsData[id];
            window.toggleView('admin', false);
        }

        let isSuccessModal = true;
        window.closeModal = function () {
            document.getElementById('customAlert').style.display = 'none';
            if (isSuccessModal) {
                window.toggleView('dashboard');
            }
        };

        function showModal(msg, success = true) {
            isSuccessModal = success;
            document.getElementById('modalMsg').innerText = msg;
            document.getElementById('modalIcon').innerText = success ? '✅' : '❌';
            document.getElementById('modalIcon').style.color = success ? '#2ecc71' : '#d31a1a';
            document.getElementById('customAlert').style.display = 'flex';
        }

        const rootRef = ref(db, 'avstudio_wedding_cards');
        onValue(rootRef, (snapshot) => {
            if (snapshot.exists()) {
                allClientsData = snapshot.val();
                if (document.getElementById('dashboardView').style.display !== 'none' || document.getElementById('loadingView').style.display !== 'none') {
                    window.toggleView('dashboard');
                }
            } else {
                allClientsData = {};
                window.toggleView('dashboard');
            }
        });

        function compressAndGetBase64(file, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve, reject) => {
                if (!file.type.startsWith('image/')) { reject("దయచేసి ఫోటోను మాత్రమే అప్‌లోడ్ చేయండి."); return; }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const enteredId = document.getElementById('adminClientId').value.trim();
            if (!enteredId) { alert("దయచేసి Customer ID ఎంటర్ చేయండి!"); return; }

            const saveBtn = document.getElementById('saveButton');
            saveBtn.innerText = "Syncing to Firebase...";
            saveBtn.disabled = true;

            try {
                let data = { ...globalData };
                dataFields.forEach(field => { data[field] = document.getElementById(field).value; });

                const gPhoto = document.getElementById('adminGroomPhoto').files[0];
                if (gPhoto) data.groomPhoto = await compressAndGetBase64(gPhoto);

                const bPhoto = document.getElementById('adminBridePhoto').files[0];
                if (bPhoto) data.bridePhoto = await compressAndGetBase64(bPhoto);

                const newClientRef = ref(db, 'avstudio_wedding_cards/' + enteredId);
                await set(newClientRef, data);

                saveBtn.innerText = "Save / Update to Firebase";
                saveBtn.disabled = false;
                showModal("Firebase లో డేటా అప్‌డేట్ అయ్యింది!", true);
            } catch (error) {
                console.error("Error:", error);
                saveBtn.innerText = "Save / Update to Firebase";
                saveBtn.disabled = false;
                showModal("ఎర్రర్! డేటా సేవ్ చేయడంలో ఇబ్బంది కలిగింది.", false);
            }
        });
    </script>
</body>

</html>
